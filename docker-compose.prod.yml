# Production docker-compose — pulls pre-built image from ECR.
# Used on the EC2 instance. The user-data.sh script writes this file
# to /opt/invoice-bot/docker-compose.yml with the correct ECR URL.
#
# This file is kept in the repo as a reference. The actual deployed
# version is generated by Terraform's user-data template.
#
# To use locally with an ECR image, set the ECR_REPOSITORY_URL env var:
#   ECR_REPOSITORY_URL=123456789.dkr.ecr.eu-west-2.amazonaws.com/invoice-bot \
#     docker compose -f docker-compose.prod.yml up -d

services:
  invoice-bot:
    image: ${ECR_REPOSITORY_URL:-invoice-bot}:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=Europe/London
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
